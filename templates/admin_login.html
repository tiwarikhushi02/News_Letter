<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0F172A,#1E3A8A);
        }

        .card{
            width:400px;
            background:white;
            padding:40px;
            border-radius:18px;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
            text-align:center;
        }

        h1{
            color:#2563EB;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563EB;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#1D4ED8;
        }

        .error{
            color:#DC2626;
            margin-bottom:15px;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="card">

    <h1>🤖 Admin Login</h1>

    <p>Login to manage the AI Newsletter Dashboard</p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form action="/admin/login" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
