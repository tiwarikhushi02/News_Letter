<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invalid Email</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0F172A,#1E3A8A);
        }

        .card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:18px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
        }

        h1{
            color:#DC2626;
            margin-bottom:20px;
        }

        p{
            color:#555;
            margin-bottom:30px;
            line-height:1.6;
        }

        a{
            text-decoration:none;
            background:#2563EB;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            font-weight:bold;
            transition:.3s;
        }

        a:hover{
            background:#1D4ED8;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>❌ Invalid Email Address</h1>

    <p>
        Please enter a valid email address in the correct format.<br><br>

        Example:
        <strong>username@example.com</strong>
    </p>

    <a href="/">← Back to Home</a>

</div>

</body>
</html>
