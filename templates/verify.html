<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0F172A,#1E3A8A);
        }

        .card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:18px;
            text-align:center;
            box-shadow:0 15px 35px rgba(0,0,0,.25);
        }

        h1{
            color:#2563EB;
            margin-bottom:15px;
        }

        p{
            color:#555;
            margin-bottom:20px;
            line-height:1.6;
        }

        .error{
            color:#DC2626;
            font-weight:bold;
            margin-bottom:15px;
        }

        .success{
            color:#16A34A;
            font-weight:bold;
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:18px;
            text-align:center;
            letter-spacing:4px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            color:white;
            font-size:16px;
            font-weight:bold;
            transition:.3s;
        }

        .verify-btn{
            background:#2563EB;
            margin-bottom:15px;
        }

        .verify-btn:hover{
            background:#1D4ED8;
        }

        .resend-btn{
            background:#10B981;
        }

        .resend-btn:hover{
            background:#059669;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>📧 Verify Your Email</h1>

    <p>
        Enter the 6-digit OTP sent to your email.
    </p>

    {% if error %}

    <p class="error">
        {{ error }}
    </p>

    {% endif %}

    {% if message %}

    <p class="success">
        {{ message }}
    </p>

    {% endif %}

    <form action="/verify" method="POST">

        <input
            type="hidden"
            name="email"
            value="{{ email }}">

        <input
            type="text"
            name="otp"
            maxlength="6"
            placeholder="Enter OTP"
            required>

        <button
            class="verify-btn"
            type="submit">
            Verify OTP
        </button>

    </form>

    <form action="/resend-otp" method="POST">

        <input
            type="hidden"
            name="email"
            value="{{ email }}">

        <button
            class="resend-btn"
            type="submit">
            🔄 Resend OTP
        </button>

    </form>

</div>

</body>
</html>
